<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Health OS — Private Demo</title>
<style>
:root{--bg:#F4F6F9;--s1:#fff;--b:#E5E9F0;--txt:#101828;--txt2:#475467;--txt3:#98A2B3;--primary:#175CD3;--deep:#1849A9;--red:#D92D20}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.lock{width:min(400px,92vw);background:var(--s1);border:1px solid var(--b);border-radius:18px;padding:36px 32px;box-shadow:0 1px 3px rgba(16,24,40,.06),0 12px 40px rgba(16,24,40,.08);text-align:center}
.logo{width:52px;height:52px;margin:0 auto 16px;display:block}
h1{font-size:18px;font-weight:700;letter-spacing:-.02em}
.sub{font-size:12.5px;color:var(--txt2);margin:6px 0 24px;line-height:1.5}
input{width:100%;border:1px solid #D3DAE4;border-radius:10px;padding:11px 13px;font:inherit;outline:none;text-align:center;letter-spacing:.04em;transition:.15s}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(23,92,211,.1)}
button{width:100%;margin-top:12px;border:1px solid var(--deep);border-radius:10px;background:var(--primary);color:#fff;padding:11px;font:inherit;font-weight:600;cursor:pointer;transition:.15s}
button:hover{background:var(--deep)}
button:disabled{opacity:.6;cursor:wait}
.err{color:var(--red);font-size:12px;margin-top:10px;min-height:16px}
.foot{margin-top:22px;font-size:10.5px;color:var(--txt3);display:flex;gap:6px;align-items:center;justify-content:center}
.foot svg{width:12px;height:12px;stroke:var(--txt3);fill:none;stroke-width:1.8}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .25s ease 2}
</style>
</head>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(){
  const pass=document.getElementById('key').value;
  const btn=document.getElementById('go'),err=document.getElementById('err');
  if(!pass)return;
  btn.disabled=true;btn.textContent='Decrypting…';err.textContent='';
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass.normalize('NFKC')),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(P.salt),iterations:P.iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(P.iv)},key,b64(P.ct));
    const htmlText=new TextDecoder().decode(pt);
    sessionStorage.setItem('hos_demo_ok','1');
    document.open();document.write(htmlText);document.close();
  }catch(e){
    btn.disabled=false;btn.textContent='Unlock';
    err.textContent='Incorrect key — please try again.';
    const l=document.getElementById('lock');l.classList.remove('shake');void l.offsetWidth;l.classList.add('shake');
  }
}
document.getElementById('go').onclick=unlock;
document.getElementById('key').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
</script>
