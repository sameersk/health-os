<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health OS — Public Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="./manifest.webmanifest">

<style>
:root{color-scheme:light;
--bg:#F4F6F9;--s1:#FFFFFF;--s2:#F7F9FB;--s3:#EDF0F4;
--b:#E5E9F0;--b2:#D3DAE4;
--txt:#101828;--txt2:#475467;--txt3:#98A2B3;
--primary:#175CD3;--primary-deep:#1849A9;--primary-bg:#EFF4FF;--primary-glow:rgba(23,92,211,.08);
--teal:#0E9384;--green:#079455;--green-bg:#ECFDF3;--amber:#DC6803;--amber-bg:#FFFAEB;--red:#D92D20;--red-bg:#FEF3F2;
--r:14px;--r-sm:10px;--r-xs:8px;
--glow:0 1px 2px rgba(16,24,40,.05);
--glow-hover:0 1px 3px rgba(16,24,40,.07),0 4px 12px rgba(16,24,40,.05);
--shadow-md:0 2px 4px rgba(16,24,40,.04),0 6px 18px rgba(16,24,40,.06)}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
button,input,textarea,select{font:inherit;color:inherit}
b,strong,.kpi b,.domainScore,.age{font-variant-numeric:tabular-nums}
::selection{background:var(--primary-bg)}

/* ── Shell: sidebar + main ─────────────────────────────────────────────── */
.app{display:grid;grid-template-columns:236px minmax(0,1fr);min-height:100vh;max-width:none;margin:0;padding:0}
.side{position:sticky;top:0;height:100vh;display:flex;flex-direction:column;background:var(--s1);border-right:1px solid var(--b);padding:20px 14px;z-index:30}
.brand{display:flex;align-items:center;gap:10px;padding:2px 8px 18px;border-bottom:1px solid var(--b);margin-bottom:14px}
.brand h1{font-size:15.5px;font-weight:700;letter-spacing:-.02em}
.brand .sub{font-size:10.5px;color:var(--txt3);font-weight:500;letter-spacing:.02em;margin-top:1px}
.logo{width:34px;height:34px;flex-shrink:0}
.tabs{display:flex;flex-direction:column;gap:2px;background:none;border:0;padding:0;margin:0;overflow:visible}
.tab{display:flex;align-items:center;gap:10px;color:var(--txt2);text-decoration:none;border-radius:var(--r-xs);padding:9px 10px;cursor:pointer;white-space:nowrap;font-size:13px;font-weight:500;transition:background .14s,color .14s;position:relative}
.tab svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;opacity:.85}
.tab:hover{color:var(--txt);background:var(--s2)}
.tab.active{color:var(--primary-deep);background:var(--primary-bg);font-weight:600}
.tab.active::before{content:'';position:absolute;left:-14px;top:7px;bottom:7px;width:3px;border-radius:0 3px 3px 0;background:var(--primary)}
.side-foot{margin-top:auto;padding:14px 8px 2px;border-top:1px solid var(--b)}
.side-foot .lock{display:flex;gap:8px;align-items:flex-start;font-size:10.5px;color:var(--txt3);line-height:1.45}
.side-foot .lock svg{width:13px;height:13px;stroke:var(--txt3);fill:none;stroke-width:1.8;flex-shrink:0;margin-top:1px}
.side-foot .ver{font-size:10px;color:var(--txt3);margin-top:8px;opacity:.7}

.main{min-width:0;padding:0 28px 48px}
.top{display:flex;gap:16px;align-items:center;justify-content:space-between;padding:16px 0 14px;margin-bottom:18px;border-bottom:1px solid var(--b);position:sticky;top:0;background:var(--bg);z-index:20}
.page-title{font-size:17px;font-weight:700;letter-spacing:-.02em}
.page-title .crumb{font-size:11px;color:var(--txt3);font-weight:500;display:block;letter-spacing:.04em;text-transform:uppercase;margin-bottom:1px}
.sync{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--b);border-radius:999px;padding:5px 11px;color:var(--txt2);background:var(--s1);font-size:11.5px;font-weight:500;box-shadow:var(--glow)}
.pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--txt3);flex-shrink:0}
.pill.ok{color:var(--green);border-color:#A6F4C5;background:var(--green-bg)}.pill.ok::before{background:var(--green)}
.pill.warn{color:var(--amber);border-color:#FEDF89;background:var(--amber-bg)}.pill.warn::before{background:var(--amber)}
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--primary-deep);border-radius:var(--r-xs);background:var(--primary);color:#fff;padding:8px 15px;font-weight:600;font-size:13px;cursor:pointer;box-shadow:var(--glow);transition:.15s}
.btn:hover{background:var(--primary-deep)}
.btn:active{transform:translateY(.5px)}
.btn.secondary{background:var(--s1);color:var(--txt);border:1px solid var(--b2);box-shadow:var(--glow)}
.btn.secondary:hover{background:var(--s2)}
.btn.small{padding:5px 10px;font-size:11px;border-radius:7px}
.hidden{display:none!important}
.view{display:none;animation:fadeUp .2s ease both}.view.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes growX{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.9}}

/* ── Cards & layout ───────────────────────────────────────────────────── */
.card{background:var(--s1);border:1px solid var(--b);border-radius:var(--r);padding:20px;box-shadow:var(--glow);transition:box-shadow .18s,border-color .18s}
.card:hover{box-shadow:var(--glow-hover)}
.card h2{font-size:14.5px;font-weight:650;margin:0 0 14px;letter-spacing:-.01em}
.card h3{font-size:10.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;font-weight:650;margin:0 0 12px}
.grid{display:grid;gap:14px}.cols2{grid-template-columns:1fr 1fr}.cols3{grid-template-columns:repeat(3,1fr)}.cols4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.cols3,.cols4{grid-template-columns:1fr 1fr}}
@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:fixed;left:0;right:0;top:auto;bottom:0;height:auto;flex-direction:row;align-items:center;padding:6px 10px;border-right:0;border-top:1px solid var(--b);box-shadow:0 -4px 16px rgba(16,24,40,.06)}.brand,.side-foot{display:none}.tabs{flex-direction:row;overflow-x:auto;width:100%}.tab{flex-direction:column;gap:3px;font-size:9.5px;padding:7px 9px}.tab.active::before{display:none}.cols2,.cols3,.cols4{grid-template-columns:1fr}.main{padding:0 14px 90px}.top{flex-direction:column;align-items:flex-start;gap:10px}.sync{justify-content:flex-start}}

/* ── Hero ─────────────────────────────────────────────────────────────── */
.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
@media(max-width:900px){.hero{grid-template-columns:1fr}}
.hero-card{background:linear-gradient(135deg,#0B2A5B 0%,#163E83 55%,#175CD3 130%);border:1px solid #1849A9;border-radius:var(--r);padding:28px;position:relative;overflow:hidden;color:#fff;box-shadow:var(--shadow-md)}
.hero-card::before{content:'';position:absolute;top:-70px;right:-50px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.09),transparent 70%);pointer-events:none}
.hero-eyebrow{font-size:10.5px;font-weight:650;letter-spacing:.1em;text-transform:uppercase;color:#A4BCFD;margin-bottom:10px}
.age{font-size:72px;font-weight:250;letter-spacing:-.04em;line-height:.95;color:var(--txt)}
.age-unit{font-size:26px;font-weight:300;opacity:.45;margin-left:4px}
.age.good{color:var(--green)}.age.warn{color:var(--amber)}.age.bad{color:var(--red)}
.hero-card .age{color:#fff}
.hero-meta{font-size:12.5px;color:rgba(255,255,255,.65);margin-top:12px}
.pace-badge{display:inline-flex;align-items:center;gap:5px;margin-top:14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:4px 12px;font-size:12px;font-weight:600;color:#D1E0FF;backdrop-filter:blur(4px)}
.kpi{display:flex;justify-content:space-between;gap:8px;border-top:1px solid rgba(255,255,255,.14);padding-top:16px;margin-top:18px}
.kpi-item{display:flex;flex-direction:column;gap:3px}
.kpi b{font-size:21px;font-weight:600}
.kpi-sub{font-size:9px;color:rgba(255,255,255,.5);margin-top:1px}

/* ── Text & metric helpers ────────────────────────────────────────────── */
.muted{color:var(--txt2)}.small{font-size:12px}.tiny{font-size:11px}
.goodC{color:var(--green)}.warnC{color:var(--amber)}.badC{color:var(--red)}
.score{height:6px;background:var(--s3);border-radius:99px;overflow:hidden}
.score span{display:block;height:100%;border-radius:99px;transform-origin:left;animation:growX .7s cubic-bezier(.4,0,.2,1) both}
.metric{display:flex;gap:10px;align-items:center}.metric .name{flex:1;font-size:13px;color:var(--txt2)}
.dot{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
.tag{font-size:10.5px;font-weight:550;border:1px solid var(--b);padding:2.5px 8px;border-radius:999px;color:var(--txt2);display:inline-flex;gap:4px;align-items:center;background:var(--s2)}
.tag.direct{border-color:#A6F4C5;color:var(--green);background:var(--green-bg)}
.tag.proxy{border-color:#B2CCFF;color:var(--primary);background:var(--primary-bg)}
.tag.manual{border-color:#FEDF89;color:var(--amber);background:var(--amber-bg)}
.tag.ai{border-color:#E9D7FE;color:#6941C6;background:#F9F5FF}

/* ── Domains / matrix ─────────────────────────────────────────────────── */
.matrix{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px}
.domain{background:var(--s1);border:1px solid var(--b);border-radius:var(--r);padding:16px 16px 16px 19px;box-shadow:var(--glow);transition:.18s;position:relative;overflow:hidden}
.domain::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--dc)}
.domain:hover{box-shadow:var(--glow-hover);transform:translateY(-1px)}
.domainTop{display:flex;justify-content:space-between;gap:10px;align-items:center}
.domainScore{font-size:28px;font-weight:650;color:var(--dc);letter-spacing:-.02em}
.component{margin-top:10px}.componentRow{display:flex;justify-content:space-between;gap:8px;margin-bottom:5px;color:var(--txt2);font-size:12px}
.deltaRow{display:grid;grid-template-columns:160px 1fr 58px;gap:10px;align-items:center;margin:9px 0}
.bar{height:6px;background:var(--s3);border-radius:99px;overflow:hidden}.bar span{height:100%;display:block;border-radius:99px}

/* ── Body map ─────────────────────────────────────────────────────────── */
.bodyLayout{display:grid;grid-template-columns:minmax(340px,500px) 1fr;gap:14px}
@media(max-width:980px){.bodyLayout{grid-template-columns:1fr}}
.figure{position:relative;display:flex;justify-content:center;align-items:flex-start;min-height:620px;background:var(--s1);border:1px solid var(--b);border-radius:var(--r);padding:20px 12px;overflow:hidden;box-shadow:var(--glow)}
.bodyGlow{position:absolute;top:18%;left:50%;transform:translateX(-50%);width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(23,92,211,.05),transparent 70%);animation:pulse 3s ease-in-out infinite;pointer-events:none}
.bodyShell{position:relative;z-index:2;width:100%;display:flex;justify-content:center;filter:drop-shadow(0 6px 18px rgba(16,24,40,.10));animation:bodyFloat 7s ease-in-out infinite}
.organLabel{font-size:10px;font-weight:700;fill:#475467;letter-spacing:.08em}
.leader{stroke:rgba(16,24,40,.22);stroke-width:1;stroke-dasharray:2 3}
.organDetail{stroke:rgba(16,24,40,.26);stroke-width:1.1;fill:none}
.muscle{cursor:pointer;stroke:rgba(16,24,40,.13);stroke-width:1;transition:filter .15s,stroke .15s;animation:tissueIn .35s ease both}
.muscle:hover{filter:brightness(1.05) saturate(1.12);stroke:var(--primary);stroke-width:1.6}
.organShape{stroke:rgba(16,24,40,.2);stroke-width:1.1}
.sil{pointer-events:none}
.tooltip{position:fixed;pointer-events:none;background:#101828;color:#fff;border:1px solid #1D2939;padding:8px 12px;border-radius:var(--r-xs);font-size:12px;display:none;z-index:100;box-shadow:var(--shadow-md)}
@keyframes bodyFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes tissueIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}

/* ── Habits, forms, tables ────────────────────────────────────────────── */
.habit{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:12px 14px;border:1px solid var(--b);border-radius:var(--r-sm);background:var(--s1);margin-bottom:8px;transition:.15s;box-shadow:var(--glow)}
.habit:hover{border-color:var(--b2);box-shadow:var(--glow-hover)}
.habit input{width:17px;height:17px;accent-color:var(--primary)}
.streak{font-size:11px;color:var(--txt3)}
textarea,input,select{width:100%;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-sm);color:var(--txt);padding:10px 12px;outline:none;transition:border-color .15s,box-shadow .15s;box-shadow:var(--glow)}
textarea:focus,input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
textarea{min-height:90px;resize:vertical}
textarea::placeholder,input::placeholder{color:var(--txt3)}
.logItem{border-top:1px solid var(--b);padding:10px 0}
.coachOut{white-space:pre-wrap;line-height:1.6;background:var(--s2);border:1px solid var(--b);border-radius:var(--r-sm);padding:14px;min-height:140px;font-size:13px;color:var(--txt2)}
.table{width:100%;border-collapse:collapse}.table th,.table td{padding:9px;border-bottom:1px solid var(--b);text-align:left;font-size:12px}.table th{color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;font-size:10.5px;font-weight:650}
.seg{display:flex;gap:4px;margin:0 0 12px}.seg button{background:var(--s1);border:1px solid var(--b2);color:var(--txt2);border-radius:var(--r-xs);padding:6px 12px;cursor:pointer;font-size:12px;font-weight:500;transition:.14s;box-shadow:var(--glow)}.seg button.active{background:var(--primary);color:#fff;border-color:var(--primary-deep);font-weight:600}

/* ── Charts ───────────────────────────────────────────────────────────── */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}}
.chart-inner{background:var(--s1);border-radius:var(--r-sm);padding:14px;border:1px solid var(--b);box-shadow:var(--glow)}
.chart-inner h3{margin:0 0 10px}
.chart-inner canvas{display:block;width:100%!important;height:90px!important}
</style>
</head>

    if(cached.vo2?.value!=null)state.metrics.vo2=cached.vo2.value;
    const have=new Set(state.food.map(f=>f.id));
    DEMO_FOOD.forEach(f=>{if(!have.has(f.id))state.food.push(f)});

function get7dNutrition(){
  // Aggregate last 7 days of food logs with parsed nutrition
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-7);
  const logs=state.food.filter(f=>{try{return new Date(f.date)>=cutoff}catch{return false}});
  if(!logs.length)return null;
  // Group by date, sum per day, then average across days
  const byDay={};
  for(const f of logs){
    if(!f.nutrition)continue;
    byDay[f.date]=byDay[f.date]||{count:0};
    for(const[k,v] of Object.entries(f.nutrition)){
      if(typeof v==='number'){byDay[f.date][k]=(byDay[f.date][k]||0)+v;}
    }
    byDay[f.date].count++;
  }
  const days=Object.values(byDay).filter(d=>d.count>0);
  if(!days.length)return null;
  const avg7={};
  for(const k of Object.keys(NUTRIENT_RDAS)){
    const vals=days.map(d=>d[k]).filter(v=>v!=null);
    avg7[k]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
  }
  return avg7;
}

function nutrientCoverageScore(nutrient,value){
  // Returns 0-100 score: 100 = meeting RDA, 0 = severely deficient
  const rda=NUTRIENT_RDAS[nutrient]?.rda;
  if(!rda||value==null)return null;
  if(nutrient==='sodium_mg') return value<=2300?100:Math.max(0,100-(value-2300)/10); // lower is better for sodium
  return Math.min(100,Math.round(value/rda*100));
}

function nutritionDomainBonus(){
  // Returns {domainId: nutritionScore} — the nutrition contribution to each domain
  const n7=get7dNutrition();
  if(!n7)return {};
  const domainNutriScores={};  // domain → [weighted scores]
  for(const[nutrient,domainWeights] of Object.entries(NUTRIENT_DOMAINS)){
    const score=nutrientCoverageScore(nutrient,n7[nutrient]);
    if(score==null)continue;
    for(const[domain,weight] of Object.entries(domainWeights)){
      domainNutriScores[domain]=domainNutriScores[domain]||[];
      domainNutriScores[domain].push(score*weight);
    }
  }
  const result={};
  for(const[domain,scores] of Object.entries(domainNutriScores)){
    result[domain]=Math.round(scores.reduce((a,b)=>a+b,0));
  }
  return result;
}

  m.rem=avg(s,x=>x.rem_sleep_percent);

function scoreFor(key){const m={...state.metrics,...state.manual};const v=m[key];if(v==null||Number.isNaN(v))return null;

  if(key==='avgSteps')return clamp(v/8000*100);
  if(key==='strengthMinutes')return v>=60?95:v>=30?75:v>=15?50:25;  // 30-day target ≥60min
  if(key==='zoneScore')return clamp(v);

function buildRecommendations(){
  const c=recContext();
  const fired=[];
  for(const r of HCP_RULES){
    let why=null;
    try{why=r.test(c)}catch(e){console.warn('rec rule failed:',r.title,e)}
    if(why)fired.push({...r,why});
  }
  fired.sort((a,b)=>a.pri-b.pri);
  return {fired,total:HCP_RULES.length};
}
function recommendationsHTML(){
  const {fired,total}=buildRecommendations();
  if(!fired.length)return '';
  const byCat={};fired.forEach(r=>{(byCat[r.cat]=byCat[r.cat]||[]).push(r)});
  const PRI_LBL={1:'priority',2:'this week',3:'build up'};
  const PRI_COL={1:'var(--red)',2:'var(--amber)',3:'var(--txt2)'};
  return `<div class="card" style="margin-top:12px">
    <h2 style="margin-bottom:4px">Recommendations <span class="muted small" style="font-size:11px;font-weight:400">${fired.length} of ${total} presets triggered · evidence-based · not medical advice</span></h2>
    ${Object.keys(REC_CATS).filter(k=>byCat[k]).map(k=>{

            <span class="tiny" style="color:${PRI_COL[r.pri]};font-size:10px;text-transform:uppercase;letter-spacing:.5px">${PRI_LBL[r.pri]}</span>

function metricLine(name,score,color){return `<div class="metric" style="margin:10px 0"><span class="dot" style="background:${color}"></span><div class="name">${name}</div><b>${score??'—'}</b></div><div class="score"><span style="width:${score??0}%;background:${color}"></span></div>`}
function whoopMetricStatus(key,val,target,unit=''){
  // Returns {label, value, status: 'good'|'warn'|'bad'|'na', note}
  const v=val??state.metrics[key]??state.manual[key];
  if(v==null) return {label:key,value:'—',status:'na',note:'No data'};
  const fmt=typeof v==='number'?`${Math.round(v*10)/10}${unit}`:v;
  return {value:fmt,status:scoreFor(key)>=75?'good':scoreFor(key)>=45?'warn':'bad'};
}

async function loadFoodFromServer(){
  if(window.__DEMO__)return false;
  try{
    const {base}=apiConfig();
    const r=await fetch(`${base}/api/food`); if(!r.ok)return false;
    const j=await r.json(); const server=j.result||[];
    if(!Array.isArray(server))return false;
    const byId={}; state.food.forEach(f=>{if(f.id)byId[f.id]=f});
    let changed=false;
    for(const s of server){
      if(s.id&&byId[s.id]){
        // Server copy wins if it has nutrition and local doesn't (artifact filled it in)
        if(s.nutrition&&!byId[s.id].nutrition){Object.assign(byId[s.id],s);changed=true;}
      }else if(!state.food.some(f=>!f.id&&f.date===s.date&&f.text===s.text)){
        state.food.push(s);changed=true;
      }
    }
    // Push up any local-only entries so the artifact can see/analyse them
    const serverIds=new Set(server.map(s=>s.id));
    const localOnly=state.food.filter(f=>!f.id||!serverIds.has(f.id));
    if(localOnly.length){localOnly.forEach(f=>{f.id=f.id||'f'+Date.now()+Math.random().toString(36).slice(2,6)});postFoodToServer({entries:localOnly});}
    if(changed){save('food',state.food);computeDerived();render();}
    return changed;
  }catch(e){console.warn('food load:',e);return false}
}

let _charts={};
function mkChart(id,type,labels,data,color){
  if(typeof Chart==='undefined'){const el=document.getElementById(id);if(el&&el.parentElement&&!el.parentElement.querySelector('.chart-err')){const m=document.createElement('div');m.className='chart-err tiny muted';m.textContent='Chart.js failed to load — check chart.umd.js is next to this file';el.parentElement.appendChild(m);}return;}
  if(_charts[id]){try{_charts[id].destroy()}catch{}delete _charts[id];}
  const el=document.getElementById(id); if(!el)return;
  // Never draw into a hidden canvas — Chart.js mis-sizes it (skewed/stretched charts).
  // Tab activation re-runs initTrendCharts, so the newly visible set gets drawn then.
  if(el.offsetParent===null)return;
  const valid=data.filter(x=>x!=null);
  if(!valid.length){el.style.display='none';return;}
  el.style.display='block';
  // maintainAspectRatio:false + explicit height on canvas prevents Chart.js collapsing to 0px
  el.style.height='90px';
  _charts[id]=new Chart(el.getContext('2d'),{
    type,
    data:{labels,datasets:[{data,backgroundColor:type==='bar'?color+'BB':color+'22',borderColor:color,borderWidth:2,fill:type==='line',tension:.35,pointRadius:2,pointHoverRadius:4,spanGaps:true}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:400},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw!=null?String(Math.round(ctx.raw*10)/10):''}}},
      scales:{
        x:{ticks:{font:{size:9},maxRotation:45,maxTicksLimit:12},grid:{display:false},border:{display:false}},
        y:{ticks:{font:{size:9},maxTicksLimit:5},grid:{color:'rgba(0,0,0,.06)'},border:{display:false}}
      }
    }
  });
}
function initTrendCharts(){

  const st=[...state.steps].sort((a,b)=>String(a.calendarDate||a.date||'').localeCompare(String(b.calendarDate||b.date||'')));

  // Helper: render to both Today-tab (tXxx) and Healthspan-tab (chartXxx) canvases

  // Healthspan tab canvases only render correctly when that tab is active
  function draw(todayId, healthId, type, labels, data, color){
    mkChart(todayId, type, labels, data, color);
    mkChart(healthId, type, labels, data, color);
  }

  if(sl.length){
    const lb=sl.map(x=>fd(x.date));
    draw('tSleep',     'chartSleep',     'bar',  lb, sl.map(x=>x.sleep_hours?Math.round(x.sleep_hours*10)/10:null), '#6172F3');

    draw('tSleepScore','chartSleepScore','line', lb, sl.map(x=>x.sleep_score??null), '#7A5AF8');
  }
  if(st.length){
    const lb=st.map(x=>fd(x.calendarDate||x.date));
    draw('tSteps','chartSteps','bar', lb, st.map(x=>x.totalSteps??null), '#0086C9');
  }
  if(bb.length){
    draw('tBb','chartBb','line', bb.map(x=>fd(x.date)), bb.map(x=>x.value), '#CA8504');
  }
  if(stress.length){
    draw('tStress','chartStress','bar', stress.map(x=>fd(x.date)), stress.map(x=>x.stress_drain), '#DD2590');
  }
}

  document.querySelectorAll('[data-habit]').forEach(i=>i.onchange=()=>{state.habits[TODAY]=state.habits[TODAY]||{};state.habits[TODAY][i.dataset.habit]=i.checked;save('habits',state.habits);render()});
  document.querySelectorAll('[data-manual]').forEach(i=>i.onchange=()=>{state.manual[i.dataset.manual]=i.value===''?null:Number(i.value)||i.value;save('manual',state.manual);computeDerived();render()});
  const foodAdd=document.getElementById('foodAdd'); if(foodAdd)foodAdd.onclick=()=>{const t=document.getElementById('foodText').value.trim();if(t){const entry={id:'f'+Date.now(),date:TODAY,text:t};state.food.push(entry);save('food',state.food);postFoodToServer(entry);computeDerived();render()}};
  const foodAi=document.getElementById('foodAi'); if(foodAi)foodAi.onclick=async()=>{
    const t=document.getElementById('foodText').value.trim();if(!t)return;
    const out=document.getElementById('foodResult');
    out.textContent='Estimating nutrients…';
    const raw=await askNutritionAI(t);
    if(raw){
      // Try to parse as JSON first (new structured format); fall back to text parse
      let nutrition=null;
      try{
        const cleaned=typeof raw==='string'?raw.trim().replace(/^```json?\s*/,'').replace(/```\s*$/,''):null;
        nutrition=cleaned?JSON.parse(cleaned):(typeof raw==='object'?raw:null);
      }catch{nutrition=parseNutritionText(raw);}
      const entry={id:'f'+Date.now(),date:TODAY,text:t,nutrition,aiText:raw};
      state.food.push(entry);save('food',state.food);postFoodToServer(entry);computeDerived();render();
      const cal=nutrition?.calories?`${Math.round(nutrition.calories)} kcal · `:'';
      const pro=nutrition?.protein_g?`${Math.round(nutrition.protein_g)}g protein · `:'';
      const fib=nutrition?.fiber_g?`${Math.round(nutrition.fiber_g)}g fiber`:'';
      out.textContent=`Saved. ${cal}${pro}${fib}\n\nFull estimate stored in log.`;
    }else{
      // No AI here — save as pending; the Health OS Cowork artifact analyses pending entries with Claude (free)
      const entry={id:'f'+Date.now(),date:TODAY,text:t};
      state.food.push(entry);save('food',state.food);postFoodToServer(entry);computeDerived();render();
      out.textContent='Logged locally in your browser. AI nutrient analysis is disabled in the public demo.';
    }
  };
  const supp=document.getElementById('suppAdd'); if(supp)supp.onclick=()=>{const t=document.getElementById('suppText').value.trim();if(t){state.supplements.push({date:TODAY,text:t});save('supplements',state.supplements);computeDerived();render()}};
  const coach=document.getElementById('coachBtn'); if(coach)coach.onclick=async()=>{const out=document.getElementById('coachOut');const q=document.getElementById('coachQuestion')?.value?.trim()||'How am I doing today?';out.textContent='Generating...';const ai=await askAI(coachPrompt(q),coachContext(q));state.aiNotes=ai||fallbackCoach();save('aiNotes',state.aiNotes);out.textContent=state.aiNotes};
  const connector=document.getElementById('connectorMode'); if(connector)connector.onchange=()=>{state.connectorMode=connector.value;save('connectorMode',state.connectorMode);render()};
  const directBase=document.getElementById('directApiBase'); if(directBase)directBase.onchange=()=>{state.directApiBase=directBase.value.trim();save('directApiBase',state.directApiBase);render()};
  const apiToken=document.getElementById('appApiToken'); if(apiToken)apiToken.onchange=()=>{state.appApiToken=apiToken.value.trim();save('appApiToken',state.appApiToken);render()};
  const testDirect=document.getElementById('testDirectApi'); if(testDirect)testDirect.onclick=async()=>{const el=document.getElementById('directApiStatus');el.textContent='Testing proxy...';try{const {base}=apiConfig();let r=await fetch(`${base}/health`);let txt=await r.text();if(!r.ok||!txt.trim().startsWith('{')){r=await fetch(`${base}/api/health`);txt=await r.text()}const j=JSON.parse(txt);el.textContent=r.ok?`Proxy reachable\nGarmin configured: ${j.garminConfigured}\nAI configured: ${j.aiConfigured}\nMock Garmin: ${j.mockGarmin}\nMock AI: ${j.mockAi}`:'Proxy returned '+r.status}catch(e){el.textContent='Proxy unreachable: '+e.message}};
  const testGarmin=document.getElementById('testGarminAuth'); if(testGarmin)testGarmin.onclick=async()=>{const el=document.getElementById('directApiStatus');el.textContent='Testing Garmin profile...';try{const {base}=apiConfig();const headers=apiHeaders();const r=await fetch(`${base}/api/garmin/user-profile`,{method:'POST',headers,body:'{}'});const j=await r.json();el.textContent=r.ok?`Garmin OK\nDOB: ${j.result?.userData?.birthDate||'unknown'}\nProfile ID: ${j.result?.id||j.result?.userProfileId||'unknown'}`:`Garmin failed ${r.status}\n${j.error||''}`}catch(e){el.textContent='Garmin test failed: '+e.message}};

  const testSync=document.getElementById('testGarminSync'); if(testSync)testSync.onclick=async()=>{const el=document.getElementById('directApiStatus');el.textContent='Testing full Garmin sync...';try{const sync=await directSyncFetch();if(sync){el.textContent=`Full sync OK\nDOB: ${sync.profile?.userData?.birthDate||'unknown'}\nSleep nights: ${sync.sleep?.length??0}\nStep days: ${Array.isArray(sync.steps)?sync.steps.length:0}\nActivities: ${sync.activities?.activities?.length??0}\nPartial errors: ${sync.errors?.length??0}`}else{el.textContent='Full sync failed: no response'}}catch(e){el.textContent='Full sync failed: '+e.message}};
  const testAi=document.getElementById('testAiProvider'); if(testAi)testAi.onclick=async()=>{const el=document.getElementById('directApiStatus');el.textContent='Testing AI nutrition endpoint...';try{const {base}=apiConfig();const headers=apiHeaders();const r=await fetch(`${base}/api/ai/nutrition`,{method:'POST',headers,body:JSON.stringify({foodText:'2 eggs and toast'})});const j=await r.json();el.textContent=r.ok?`AI OK\n${(j.result?.text||'').slice(0,500)}`:`AI failed ${r.status}\n${j.error||''}`}catch(e){el.textContent='AI test failed: '+e.message}};
  document.querySelectorAll('[data-body-view]').forEach(b=>b.onclick=()=>{localStorage.setItem('hospub:bodyView',b.dataset.bodyView);render()});
  const tip=document.getElementById('tip');document.querySelectorAll('[data-m]').forEach(el=>{const k=el.dataset.m;el.onmousemove=e=>{const v=state.body.M?.[k]??0;tip.style.display='block';tip.style.left=e.clientX+12+'px';tip.style.top=e.clientY+12+'px';tip.textContent=`${k}: ${v} sessions`};el.onmouseenter=()=>updateTissuePanel(k);el.onclick=()=>updateTissuePanel(k);el.onmouseleave=()=>tip.style.display='none'});
}
function activateTab(i){setTimeout(()=>{const v=document.querySelector(`[data-view="${i}"]`);if(!v)return;v.querySelectorAll('.card,.domain,.habit').forEach((el,j)=>{el.style.animation='none';void el.offsetWidth;el.style.animation=`fadeUp .26s ease ${j*.045}s both`;});},10);
  document.querySelectorAll('.tab,.view').forEach(x=>x.classList.remove('active'));
  document.querySelector(`[data-tab="${i}"]`)?.classList.add('active');
  document.querySelector(`[data-view="${i}"]`)?.classList.add('active');
  const _pn=document.getElementById('pageName'); if(_pn)_pn.textContent=['Today','Healthspan','Metrics Matrix','Body Map','Habits','Food + Supplements','AI Coach','Settings'][i]||'Today';
  if(i===0||i===1)setTimeout(initTrendCharts,60);
}
window.addEventListener('hashchange',()=>activateTab(activeIndex()));

render();
// On startup: load cached data instantly, then sync fresh data in background
(async()=>{
  if(window.__DEMO__){demoLoad();return;}
  try{
    const {base}=apiConfig();
    const r=await fetch(`${base}/api/cache`);
    if(r.ok){
      const j=await r.json();
      const cached=j.result;
      if(cached?.sleep?.length||cached?.steps?.length){
        if(cached.profile)state.profile=cached.profile;
        if(cached.rhr)state.metrics.rhr=cached.rhr?.value??cached.rhr?.allMetrics?.metricsMap?.WELLNESS_RESTING_HEART_RATE?.[0]?.value??null;
        if(cached.body_battery?.length){const validBb=cached.body_battery.filter(x=>x.charged!=null);state.metrics.bodyBattery=validBb.length?validBb[validBb.length-1].charged:null;state.bodyBatteryHistory=cached.body_battery.map(x=>({date:x.date,value:x.charged,stress_drain:x.stress_drain}));}
        if(cached.steps?.length)state.steps=cached.steps;
        if(cached.activities?.activities?.length)state.activities=cached.activities.activities;
        if(cached.sleep?.length)state.sleep=cached.sleep;
        if(cached.body_comp)state.bodyComp=cached.body_comp;
        if(cached.zone_minutes_30d)state.zoneMins30d=cached.zone_minutes_30d;
        if(cached.hrv_baseline)state.hrvBaseline=cached.hrv_baseline;
        if(cached.daily_stats?.length)state.dailyStats=cached.daily_stats;
        if(cached.vo2?.value!=null)state.metrics.vo2=cached.vo2.value;
        computeDerived();render();
        setTimeout(initTrendCharts,200);
        const ageS=j.age_seconds;
        const conn=document.getElementById('conn'),ls=document.getElementById('lastSync');
        if(conn)conn.textContent='Garmin: cached';if(conn)conn.className='pill ok';
        if(ls)ls.textContent=ageS?`Cached ${ageS<3600?Math.round(ageS/60)+'m':Math.round(ageS/3600)+'h'} ago — syncing…`:'Cached — syncing…';
      }
    }
  }catch(e){console.warn('cache load:',e)}
  // Pull shared food log (artifact may have analysed pending entries with Claude)
  loadFoodFromServer();
  // Always sync fresh data in background
  syncGarmin();
  // Re-check the food log periodically so artifact-analysed nutrients appear without a manual refresh
  setInterval(loadFoodFromServer, 60000);
})();
</script>
